<svg width="800" height="980" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:monospace">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b" dominant-baseline="central">Flowchart — solve_maze (Backtracking)</text>
<line x1="80" y1="44" x2="600" y2="44" stroke="#cbd5e1" stroke-width="0.5"/>

<!-- main() box -->
<rect x="88" y="56" width="504" height="112" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5 3"/>
<text x="104" y="73" font-size="11" fill="#94a3b8">main()</text>
<rect x="200" y="80" width="280" height="38" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.5"/>
<text x="340" y="99" text-anchor="middle" font-size="12" fill="#475569" dominant-baseline="central">Pilih maze (preset/custom) + kecepatan</text>
<line x1="340" y1="118" x2="340" y2="138" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="200" y="138" width="280" height="22" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.5"/>
<text x="340" y="149" text-anchor="middle" font-size="12" fill="#475569" dominant-baseline="central">Cari posisi S dan E di grid</text>

<line x1="340" y1="168" x2="340" y2="192" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Call solve_maze -->
<rect x="190" y="192" width="300" height="38" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="340" y="211" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af" dominant-baseline="central">solve_maze(maze, r, c, end_r, end_c)</text>
<line x1="340" y1="230" x2="340" y2="256" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Dashed box -->
<rect x="88" y="256" width="504" height="654" rx="10" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5 3"/>
<text x="104" y="274" font-size="11" fill="#94a3b8">solve_maze(maze, r, c, end_r, end_c)</text>

<!-- Decision goal -->
<polygon points="340,284 450,320 340,356 230,320" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
<text x="340" y="317" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8" dominant-baseline="central">(r,c) == (end_r,end_c)?</text>

<line x1="450" y1="320" x2="534" y2="320" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="482" y="312" text-anchor="middle" font-size="11" fill="#16a34a">YA</text>
<rect x="534" y="300" width="108" height="38" rx="19" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="588" y="319" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534" dominant-baseline="central">return True</text>
<text x="588" y="349" text-anchor="middle" font-size="11" fill="#16a34a">✓ solusi!</text>

<line x1="340" y1="356" x2="340" y2="378" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="350" y="369" font-size="11" fill="#64748b">TIDAK</text>

<!-- Mark * -->
<rect x="196" y="378" width="288" height="38" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
<text x="340" y="397" text-anchor="middle" font-size="13" font-weight="bold" fill="#713f12" dominant-baseline="central">maze[r][c] = '*'  (jika bukan S/E)</text>
<line x1="340" y1="416" x2="340" y2="436" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- print + sleep -->
<rect x="210" y="436" width="260" height="38" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.5"/>
<text x="340" y="448" text-anchor="middle" font-size="11" fill="#64748b" dominant-baseline="central">print_maze() + time.sleep(speed)</text>
<text x="340" y="464" text-anchor="middle" font-size="11" fill="#64748b" dominant-baseline="central">step_counter += 1</text>
<line x1="340" y1="474" x2="340" y2="496" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- For loop -->
<rect x="168" y="496" width="344" height="38" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
<text x="340" y="515" text-anchor="middle" font-size="12" font-weight="bold" fill="#713f12" dominant-baseline="central">UNTUK (dr,dc) ∈ [(-1,0),(1,0),(0,-1),(0,1)]</text>
<line x1="340" y1="534" x2="340" y2="558" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Decision valid -->
<polygon points="340,558 450,594 340,630 230,594" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
<text x="340" y="585" text-anchor="middle" font-size="13" font-weight="bold" fill="#4c1d95" dominant-baseline="central">dalam batas AND</text>
<text x="340" y="602" text-anchor="middle" font-size="11" fill="#4c1d95" dominant-baseline="central">maze[nr][nc] in {'.','E'}?</text>

<path d="M450 594 L560 594 L560 515 L512 515" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="506" y="586" text-anchor="middle" font-size="11" fill="#94a3b8">TIDAK</text>

<line x1="340" y1="630" x2="340" y2="652" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="350" y="643" font-size="11" fill="#64748b">YA</text>

<!-- Rekursi -->
<rect x="190" y="652" width="300" height="38" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="340" y="671" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af" dominant-baseline="central">solve_maze(maze, nr, nc, ...)</text>
<line x1="340" y1="690" x2="340" y2="714" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Decision hasil -->
<polygon points="340,714 430,748 340,782 250,748" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
<text x="340" y="745" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534" dominant-baseline="central">hasil == True ?</text>

<line x1="430" y1="748" x2="534" y2="748" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="470" y="740" text-anchor="middle" font-size="11" fill="#16a34a">YA</text>
<rect x="534" y="728" width="108" height="38" rx="19" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="588" y="747" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534" dominant-baseline="central">return True</text>

<line x1="340" y1="782" x2="340" y2="806" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="350" y="796" font-size="11" fill="#dc2626">TIDAK</text>

<!-- Backtrack -->
<rect x="168" y="806" width="344" height="52" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="340" y="824" text-anchor="middle" font-size="13" font-weight="bold" fill="#7f1d1d" dominant-baseline="central">maze[r][c] = 'x'  (jika bukan S/E)</text>
<text x="340" y="842" text-anchor="middle" font-size="11" fill="#7f1d1d" dominant-baseline="central">print_maze() + step_counter += 1</text>
<line x1="340" y1="858" x2="340" y2="878" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- return False -->
<rect x="270" y="878" width="140" height="36" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="340" y="896" text-anchor="middle" font-size="13" font-weight="bold" fill="#7f1d1d" dominant-baseline="central">return False</text>

<!-- Loop back -->
<path d="M168 832 L118 832 L118 515 L168 515" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<!-- Legend -->
<rect x="88" y="926" width="504" height="44" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
<circle cx="116" cy="941" r="5" fill="#16a34a"/>
<text x="126" y="941" font-size="11" fill="#16a34a" dominant-baseline="central">Solusi ditemukan</text>
<circle cx="116" cy="960" r="5" fill="#dc2626"/>
<text x="126" y="960" font-size="11" fill="#dc2626" dominant-baseline="central">Jalan buntu (backtrack)</text>
<circle cx="310" cy="941" r="5" fill="#3b82f6"/>
<text x="320" y="941" font-size="11" fill="#3b82f6" dominant-baseline="central">Decision / rekursi</text>
<circle cx="310" cy="960" r="5" fill="#ca8a04"/>
<text x="320" y="960" font-size="11" fill="#ca8a04" dominant-baseline="central">Iterasi / aksi</text>
<circle cx="500" cy="950" r="5" fill="#94a3b8"/>
<text x="510" y="950" font-size="11" fill="#94a3b8" dominant-baseline="central">Coba arah lain</text>
</svg>
